<!doctype html>
<html
  lang="ja"{{series_attr}}
  data-theme-id="{{theme_id}}"
  data-theme-collection="{{theme_collection}}"
  data-theme-base="{{theme_base}}"
  data-theme-season="{{theme_season}}"
  data-theme-production-enabled="{{production_enabled}}"
>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{document_title}}</title>
  <meta name="description" content="{{description}}">
  <meta property="og:title" content="{{og_title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:type" content="article">
  <meta property="og:image" content="{{og_image}}">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/style-genai-shikumi.css">
  <link rel="stylesheet" href="/assets/theme.css">
  <link rel="stylesheet" href="/publishing/design/tokens.css">
  <link rel="stylesheet" href="/publishing/design/components.css">
</head>
<body class="series-page series-page-compact">
  <!-- Generated from content/ + publishing/ structured preview / Theme manifest：{{theme_manifest}} / Notion原稿作成日時：{{original_created}} / Notion原稿最終更新日時：{{original_updated}} / Web移植日時：{{web_migrated}} -->
{{site_header}}
{{reading_preferences}}
  <main>
    <section
      class="series-hero"
      data-hero-variant="{{hero_variant}}"
      data-text-contrast="{{text_contrast}}"
      data-asset-role="{{asset_role}}"
      data-asset-ref="{{asset_ref}}"
      data-asset-status="{{asset_status}}"
    >
      <p class="series-kicker">{{series_kicker}}</p>
      <h1>{{title}}</h1>
      <p class="series-subtitle">{{subtitle}}</p>
    </section>
    <div class="series-main">
      <article class="note-box">
{{body_html}}
{{article_nav}}
      </article>
    </div>
  </main>
{{site_footer}}
  <script src="/assets/theme.js" defer></script>
  <script src="/publishing/behaviors/reading-preferences-adapter.js" defer></script>
</body>
</html>
