name: Validate Sitewide UI CSS

on:
  pull_request:
    paths:
      - 'site/assets/theme.css'
      - '.github/workflows/validate-sitewide-ui-css.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate site-wide reading preference selectors
        run: |
          set -euo pipefail
          test -f site/assets/theme.css
          grep -q 'Site-wide reading preference controls' site/assets/theme.css
          grep -q 'body > .appearance-switcher' site/assets/theme.css
          grep -q 'body.series-page .series-main > .article-text-size-control' site/assets/theme.css
          grep -q '@media (max-width: 760px)' site/assets/theme.css

      - name: Check CSS brace balance
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('site/assets/theme.css').read_text(encoding='utf-8')
          depth = 0
          for idx, char in enumerate(text):
              if char == '{':
                  depth += 1
              elif char == '}':
                  depth -= 1
              if depth < 0:
                  raise SystemExit(f'CSS brace underflow near offset {idx}')
          if depth != 0:
              raise SystemExit(f'CSS brace imbalance: depth={depth}')
          print('CSS brace balance: OK')
          PY
